feeds:
  - id: monterey-otters
    name: Monterey Sea Otters
    source:
      type: youtube
      url: "https://www.youtube.com/watch?v=abbR-Ttd-cA"
    detector:
      type: roboflow
      workspace: cats-workspace-zqd47
      workflow_id: find-otter
      output_key: predictions
      class_name: otter
      confidence_threshold: 0.3
    debounce:
      sample_interval_s: 2.0
      enter_frames: 3
      exit_frames: 5
      cooldown_s: 120
    sinks: [console]
